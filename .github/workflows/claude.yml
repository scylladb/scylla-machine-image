name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Workaround for anthropics/claude-code-action#821:
      # The action runs `git fetch origin <branch>` which fails for fork PRs
      # because the branch only exists on the fork, not on origin.
      # This step installs a thin git wrapper that intercepts the failing fetch
      # and retries using GitHub's refs/pull/N/head ref (which origin always has).
      - name: Setup fork PR support
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine PR number from the event context
          PR_NUMBER=""
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            # issue_comment events: PR number is in issue.number (only if it's a PR)
            IS_PR=$(jq -r '.issue.pull_request // empty' "$GITHUB_EVENT_PATH")
            if [ -n "$IS_PR" ]; then
              PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            fi
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ] || \
               [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          fi

          # Validate PR number is numeric
          if [ -n "$PR_NUMBER" ] && ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Unexpected PR_NUMBER value '$PR_NUMBER', skipping fork setup"
            exit 0
          fi

          # Only proceed if this is a PR event
          if [ -z "$PR_NUMBER" ]; then
            echo "Not a PR event, skipping fork setup"
            exit 0
          fi

          # Check if the PR is from a fork
          IS_FORK=$(gh pr view "$PR_NUMBER" --json isCrossRepository -q .isCrossRepository 2>/dev/null || echo "false")
          if [ "$IS_FORK" != "true" ]; then
            echo "PR #${PR_NUMBER} is not from a fork, skipping"
            exit 0
          fi

          echo "PR #${PR_NUMBER} is from a fork — installing git wrapper"

          REAL_GIT="$(which git)"
          if [ "$REAL_GIT" = "/usr/local/bin/git" ]; then
            REAL_GIT="/usr/bin/git"
          fi

          # Install a wrapper that intercepts `git fetch origin <branch>` failures
          # and retries using the PR ref. All other git commands pass through unchanged.
          # Security: fetches only from origin using GitHub's read-only PR refs —
          # no fork remotes are added and no fork code is executed by this step.
          sudo tee /usr/local/bin/git > /dev/null << WRAPPER
          #!/bin/bash
          # If this is a fetch from origin and it fails, retry via PR ref
          if [[ "\$1" == "fetch" && "\$2" == "origin" ]]; then
            OUTPUT=\$("$REAL_GIT" "\$@" 2>&1)
            EXIT_CODE=\$?
            if [ \$EXIT_CODE -ne 0 ] && echo "\$OUTPUT" | grep -qE "couldn't find remote ref|not found"; then
              echo "\$OUTPUT" >&2
              echo "Fork PR detected — retrying fetch via refs/pull/${PR_NUMBER}/head" >&2
              # Extract --depth flag and branch name (skip fetch, origin, and flag args)
              DEPTH_FLAG=""
              BRANCH_NAME=""
              for arg in "\${@:3}"; do
                case "\$arg" in
                  --depth=*) DEPTH_FLAG="\$arg" ;;
                  -*) ;;
                  *) BRANCH_NAME="\$arg" ;;
                esac
              done
              FETCH_ARGS=()
              [ -n "\$DEPTH_FLAG" ] && FETCH_ARGS+=("\$DEPTH_FLAG")
              [ -n "\$BRANCH_NAME" ] && FETCH_ARGS+=( "+refs/pull/${PR_NUMBER}/head:refs/heads/\$BRANCH_NAME")
              "$REAL_GIT" fetch origin "\${FETCH_ARGS[@]}" 2>&1
              exit \$?
            else
              echo "\$OUTPUT"
              exit \$EXIT_CODE
            fi
          else
            exec "$REAL_GIT" "\$@"
          fi
          WRAPPER
          sudo chmod +x /usr/local/bin/git

          # Verify the wrapper works
          git --version

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
